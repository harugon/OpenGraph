name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mediawiki: [ 'REL1_46', 'master' ]

    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sqlite3, pdo_sqlite, gd, intl
          tools: composer

      - name: Checkout MediaWiki Core
        uses: actions/checkout@v4
        with:
          repository: wikimedia/mediawiki
          ref: ${{ matrix.mediawiki }}
          path: mediawiki

      - name: Checkout TextExtracts
        uses: actions/checkout@v4
        with:
          repository: wikimedia/mediawiki-extensions-TextExtracts
          ref: ${{ matrix.mediawiki }}
          path: mediawiki/extensions/TextExtracts

      - name: Checkout PageImages
        uses: actions/checkout@v4
        with:
          repository: wikimedia/mediawiki-extensions-PageImages
          ref: ${{ matrix.mediawiki }}
          path: mediawiki/extensions/PageImages

      - name: Checkout OpenGraph
        uses: actions/checkout@v4
        with:
          path: mediawiki/extensions/OpenGraph

      - name: Install Dependencies
        run: |
          cd mediawiki
          composer install --no-interaction

      - name: Install MediaWiki (SQLite)
        run: |
          cd mediawiki
          mkdir data
          php maintenance/run.php install --dbtype=sqlite --dbpath=data --pass=adminpassword "TestWiki" "admin"

      - name: Register Extensions
        run: |
          cd mediawiki
          echo "wfLoadExtension( 'TextExtracts' );" >> LocalSettings.php
          echo "wfLoadExtension( 'PageImages' );" >> LocalSettings.php
          echo "wfLoadExtension( 'OpenGraph' );" >> LocalSettings.php

      - name: Run PHPUnit Tests
        run: |
          cd mediawiki
          composer phpunit -- extensions/OpenGraph/tests/phpunit
